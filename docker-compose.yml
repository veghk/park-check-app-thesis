version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkcheck}
      POSTGRES_USER: ${POSTGRES_USER:-parkcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkcheck}
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-parkcheck}
      POSTGRES_USER: ${POSTGRES_USER:-parkcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkcheck}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  locust:
    image: locustio/locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
