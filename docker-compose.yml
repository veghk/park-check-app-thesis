version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkcheck}
      POSTGRES_USER: ${POSTGRES_USER:-parkcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkcheck}
    ports:
      - "5432:5432"

  web:
    build: ./backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-parkcheck}
      POSTGRES_USER: ${POSTGRES_USER:-parkcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkcheck}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

volumes:
  postgres_data:
